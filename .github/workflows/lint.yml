name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 mypy

    - name: Run black (check only)
      run: |
        black --check mmf/ tests/

    - name: Run flake8
      run: |
        flake8 mmf/ tests/ --max-line-length=120 --extend-ignore=E203,W503

    - name: Run mypy
      run: |
        mypy mmf/ --ignore-missing-imports
