# Metric definition template
# Start here when you need a new metric.
# V0 metrics can be incomplete on purpose. Add SQL, tests, and dependencies as they settle.

id: example_metric_id
name: Example Metric Name
description: >
  One or two sentences explaining what this metric measures,
  why it matters, and how it should be interpreted.

# V0 | V1 | V2
tier: V0

# active | draft | deprecated
status: active

# Team or role responsible for keeping this metric healthy
# Both 'accountable' and 'responsible' are accepted
responsible: Team / Squad / Role

# Measurement details
unit: count            # e.g. count | percent | currency | hours
grain: account_day     # e.g. user_day, account_week, org_month

# Optional, but worth filling in once people rely on the metric
requires:
  # - warehouse.schema.source_table
  # - upstream_event_name

# SQL definition
# Optional at V0. Required for V1+.
# Provide EITHER `value` OR (`numerator` + `denominator`).
sql:
  # value: |
  #   SELECT COUNT(*) FROM ...

  # numerator: |
  #   SELECT COUNT(*) FROM ...

  # denominator: |
  #   SELECT COUNT(*) FROM ...

# Data quality and sanity checks
# Optional early; add once the metric starts to matter in reviews or dashboards.
tests:
  # - type: not_null
  #   field: value
  #
  # - type: range
  #   field: value
  #   min: 0
  #   max: 100
