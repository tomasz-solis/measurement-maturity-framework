# Metric pack template
# A pack is a collection of metrics plus an optional strategy tree.
# Keep it generic — this should work across teams.

pack:
  id: example_pack_id
  name: Example Metric Pack
  version: 0.1.0
  schema_version: "1.0"  # MMF schema version for compatibility tracking
  description: >
    Short description of what this pack covers and who it is for.

